---
layout: default
---

<article class="post" aria-labelledby="post-title">
  <header class="page-header">
    <p class="update-date"><a href="/updates/">← Updates</a> · {{ page.date | date: "%B %-d, %Y" }}{% if page.tags.size > 0 %} — Tags: {% for t in page.tags %}<a href="/tags/{{ t | slugify }}/">{{ t }}</a>{% if forloop.last == false %}, {% endif %}{% endfor %}{% endif %}</p>
    <h1 id="post-title">{{ page.title }}</h1>
  </header>

  <section class="post-content">
    {{ content }}
  </section>

</article>
