blurb: |
  In a fresh, clever, and richly imagined high fantasy to delight fans of Terry Pratchett, Matt Dinniman, or T. Kingfisher, Victor Konara introduces Art the cat and his faithful paladin, Gary.

  Art used to be human. And not just any human; a world-class Ritualist, professor at the University of Singhapura, a sorcerer of some distinction. Then he got on the wrong side of the Empire. Now he's stuck at the very edge of civilization in the body of a giant orange cat. His quest to regain opposable thumbs has failed, and he now owes serious money to the kind of people you really don't want to owe anything to.

  Enter Gary the Paladin. Wonderful with edged weapons. A jaw so sharp you could crack coconuts on it. Part-time musical prodigy. And possessed of absolutely no street smarts whatsoever. Together this unlikely duo must navigate illiteracy, bandits, exorcisms, scam-ridden tournaments, fair ladies with wicked merchandising riders, and duchesses who won't take no for an answer. But when they stumble into something truly dangerous, Art discovers that survival may require more than cunning.

  It may require being friends with someone who can't read.
