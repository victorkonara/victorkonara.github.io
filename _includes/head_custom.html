<!-- Preconnect to Google Fonts servers before the font request fires -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Load fonts via <link>, not CSS @import, to avoid the waterfall delay -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Spectral:ital,wght@0,400;0,600;1,400;1,600&display=swap">

<link rel="alternate" type="application/atom+xml" title="{{ site.title }} Atom Feed" href="{{ '/feed.xml' | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS Feed" href="{{ '/feed.xml' | relative_url }}">

<script src="{{ '/assets/js/cheshire.js' | relative_url }}" defer></script>
